services:
  db:
    image: postgres:16
    container_name: b2b-portal-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: b2b-portal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d b2b-portal"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
